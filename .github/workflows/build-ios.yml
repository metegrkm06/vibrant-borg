name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Generate Xcode Project (no XcodeGen needed)
        run: python3 generate_project.py

      - name: Build App
        run: |
          xcodebuild clean build \
            -project iOSVideoPlayer.xcodeproj \
            -scheme iOSVideoPlayer \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/build" \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGN_IDENTITY="-" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ONLY_ACTIVE_ARCH=NO | tee build.log
            
      - name: Push build log to repo
        if: failure()
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout -b build-errors
          cp build.log build.log.txt
          git add build.log.txt
          git commit -m "Add build log"
          git push -f origin build-errors

      - name: Package IPA
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/build" -name "iOSVideoPlayer.app" -type d | head -1)
          echo "App: $APP_PATH"
          mkdir -p Payload
          cp -a "$APP_PATH" Payload/
          chmod +x Payload/iOSVideoPlayer.app/iOSVideoPlayer
          zip -r -y iOSVideoPlayer.ipa Payload
          ls -lh iOSVideoPlayer.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOSVideoPlayer-ipa
          path: iOSVideoPlayer.ipa
          retention-days: 30
