name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate --spec project.yml --project .

      - name: Resolve Swift Package Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project iOSVideoPlayer.xcodeproj \
            -scheme iOSVideoPlayer \
            -clonedSourcePackagesDirPath .spm-cache

      - name: Build App
        run: |
          xcodebuild clean build \
            -project iOSVideoPlayer.xcodeproj \
            -scheme iOSVideoPlayer \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ONLY_ACTIVE_ARCH=NO

      - name: Find .app Bundle
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/build" -name "iOSVideoPlayer.app" -type d | head -1)
          echo "Found: $APP_PATH"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Ad-hoc Sign with codesign
        # Use macOS built-in codesign with '-' identity for ad-hoc signature
        # This stamps a minimal fake signature so LiveContainer's dyld can map the binary
        run: |
          BINARY="$APP_PATH/iOSVideoPlayer"
          echo "Binary: $BINARY"
          
          # Write entitlements plist
          cat > /tmp/ent.plist << 'ENTEOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>get-task-allow</key>
  <true/>
  <key>application-identifier</key>
  <string>com.vibrantborg.iosvideoplayer</string>
</dict>
</plist>
ENTEOF
          
          # Ad-hoc sign: '-' means self-signed / no identity
          codesign --force --sign - --entitlements /tmp/ent.plist --timestamp=none "$BINARY"
          echo "codesign result: $?"
          codesign -dvvv "$BINARY" 2>&1 | head -20

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r iOSVideoPlayer.ipa Payload
          ls -lh iOSVideoPlayer.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOSVideoPlayer-ipa
          path: iOSVideoPlayer.ipa
          retention-days: 30
